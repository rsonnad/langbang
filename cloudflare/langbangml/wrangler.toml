name = "langbangml-api"
main = "src/index.js"
compatibility_date = "2024-12-01"
account_id = "df99afea5ab9636a19adbdead37fc133"
workers_dev = true
preview_urls = false

[vars]
PUBLIC_R2_BASE = "https://pub-5bfcb836ff7946b785556c2d8131cba5.r2.dev"
AUDIO_PREFIX = "langbang/audio"
AZURE_SPEECH_REGION = "eastus"
# Temporary Gemini failover → Azure OpenAI (gpt-5.5 on sponic-openai-eastus2) while the
# Gemini key billing is depleted. AZURE_OPENAI_KEY is set as a secret; delete that secret
# to revert all LLM text generation back to Gemini. See geminiGenerateText in src/index.js.
AZURE_OPENAI_ENDPOINT = "https://sponic-openai-eastus2.openai.azure.com"
AZURE_OPENAI_DEPLOYMENT = "gpt-5.5"
AZURE_OPENAI_API_VERSION = "2024-10-21"
ANALYTICS_ADMIN_EMAILS = "rahulioson@gmail.com"
PUBLIC_API_BASE = "https://langbangml-api.langbangml.workers.dev"
GOOGLE_WEB_CLIENT_ID = "385515827732-9r056blngf9vpv4r2ersiiv8lte5trvb.apps.googleusercontent.com"
SOURCE_CODE_URL = "https://github.com/rsonnad/langbang/tree/codex/langbangml"
AI_PHRASE_QUOTA_EMAIL = "rahulioson@gmail.com"
# Abuse controls — see docs/play-store-readiness-plan.md (Phase 0 / BE-1).
# Flip to "true" only AFTER the app + web clients send a session/agent token on
# the Gemini / phrase-complete endpoints, or anonymous LLM access will 401.
LLM_REQUIRE_AUTH = "false"
# Optional override of the cross-origin browser allowlist (default: code list).
# CORS_ALLOWED_ORIGINS = "https://langbang.org,https://www.langbang.org"

[[d1_databases]]
binding = "DB"
database_name = "langbangml"
database_id = "d259445e-d263-4ae2-a391-f0d176492265"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "langbangml"
